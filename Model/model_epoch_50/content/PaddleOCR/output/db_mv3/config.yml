Architecture:
  Backbone:
    model_name: large
    name: MobileNetV3
    scale: 0.5
  Head:
    k: 50
    name: DBHead
  Neck:
    name: DBFPN
    out_channels: 256
  Transform: null
  algorithm: DB
  model_type: det
Eval:
  dataset:
    data_dir: /content/PaddleOCR/train_data/
    label_file_list:
    - /content/PaddleOCR/train_data/label.txt
    name: SimpleDataSet
    transforms:
    - DecodeImage:
        channel_first: false
        img_mode: BGR
    - DetLabelEncode: null
    - DetResizeForTest:
        image_shape:
        - 736
        - 1280
    - NormalizeImage:
        mean:
        - 0.485
        - 0.456
        - 0.406
        order: hwc
        scale: 1./255.
        std:
        - 0.229
        - 0.224
        - 0.225
    - ToCHWImage: null
    - KeepKeys:
        keep_keys:
        - image
        - shape
        - polys
        - ignore_tags
  loader:
    batch_size_per_card: 1
    drop_last: false
    num_workers: 8
    shuffle: false
    use_shared_memory: true
Global:
  cal_metric_during_train: false
  checkpoints: null
  epoch_num: 100
  eval_batch_step:
  - 0
  - 99999
  infer_img: doc/imgs_en/img_10.jpg
  log_smooth_window: 20
  pretrained_model: ''
  print_batch_step: 10
  save_epoch_step: 1200
  save_inference_dir: null
  save_model_dir: ./output/db_mv3/
  save_res_path: ./output/det_db/predicts_db.txt
  use_gpu: true
  use_mlu: false
  use_visualdl: false
  use_xpu: false
Loss:
  alpha: 5
  balance_loss: true
  beta: 10
  main_loss_type: DiceLoss
  name: DBLoss
  ohem_ratio: 3
Metric:
  main_indicator: hmean
  name: DetMetric
Optimizer:
  beta1: 0.9
  beta2: 0.999
  lr:
    learning_rate: 0.001
  name: Adam
  regularizer:
    factor: 0
    name: L2
PostProcess:
  box_thresh: 0.6
  max_candidates: 1000
  name: DBPostProcess
  thresh: 0.3
  unclip_ratio: 1.5
Train:
  dataset:
    data_dir: /content/PaddleOCR/train_data/
    label_file_list:
    - /content/PaddleOCR/train_data/label.txt
    name: SimpleDataSet
    ratio_list:
    - 1.0
    transforms:
    - DecodeImage:
        channel_first: false
        img_mode: BGR
    - DetLabelEncode: null
    - IaaAugment:
        augmenter_args:
        - args:
            p: 0.5
          type: Fliplr
        - args:
            rotate:
            - -10
            - 10
          type: Affine
        - args:
            size:
            - 0.5
            - 3
          type: Resize
    - EastRandomCropData:
        keep_ratio: true
        max_tries: 50
        size:
        - 640
        - 640
    - MakeBorderMap:
        shrink_ratio: 0.4
        thresh_max: 0.7
        thresh_min: 0.3
    - MakeShrinkMap:
        min_text_size: 8
        shrink_ratio: 0.4
    - NormalizeImage:
        mean:
        - 0.485
        - 0.456
        - 0.406
        order: hwc
        scale: 1./255.
        std:
        - 0.229
        - 0.224
        - 0.225
    - ToCHWImage: null
    - KeepKeys:
        keep_keys:
        - image
        - threshold_map
        - threshold_mask
        - shrink_map
        - shrink_mask
  loader:
    batch_size_per_card: 16
    drop_last: false
    num_workers: 8
    shuffle: true
    use_shared_memory: true
profiler_options: null
